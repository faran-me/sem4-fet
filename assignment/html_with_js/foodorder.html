<!DOCTYPE html>
<html>

<head>
  <title>Food Order App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: black;
    }

    .container {
      width: 380px;
      margin: 30px auto;
    }

    h1 {
      color: red;
      font-size: 24px;
    }

    .subtitle {
      color: gray;
      font-size: 14px;
      margin-top: -10px;
    }

    .food-item {
      background-color: white;
      border: 2px solid green;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .food-name {
      font-size: 16px;
      color: black;

      
    }

    .food-price {
      font-size: 13px;
      color: gray;
      margin-top: 20px;
    }

    .add-btn {
      background-color: green;
      color: white;
      border-radius: 5px;
      padding: 7px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-btn:hover {
      background-color: orange;
    }

    .order-box {
      background-color: white;
      border: 1px solid red;
      border-radius: 6px;
      padding: 12px 16px;
      margin-top: 10px;
    }

    #order-items {
      color: red;
      font-size: 14px;
      margin: 6px ;
    }

    #total-price {
      font-size: 20px;
      color: black;
      margin: 0;
    }

    #submit-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background-color: #2ecc71;
      color: black;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #submit-btn:hover {
      background-color:orange;
    }

    #clear-btn {
      margin-top: 8px;
      width: 100%;
      padding: 9px;
      background-color: #eee;
      color: #555;
      border: 1px solid gray;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    #clear-btn:hover {
      background-color: #d6567e;
    }

    #success-msg {
      display: none;
      margin-top: 12px;
      background-color: #97f0ac;
      color: green;
      border-radius: 5px;
      padding: 12px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Food Order App</h1>
    <p class="subtitle">Select your items and place order</p>

    <div class="food-item">
      <div>
        <div class="food-name">Burger</div>
        <div class="food-price">Rs. 120</div>
      </div>
      <button class="add-btn" onclick="addItem('Burger', 120)">Add</button>
    </div>

    <div class="food-item">
      <div>
        <div class="food-name">Pizza</div>
        <div class="food-price">Rs. 250</div>
      </div>
      <button class="add-btn" onclick="addItem('Pizza', 250)">Add</button>
    </div>

    <div class="food-item">
      <div>
        <div class="food-name">Momos</div>
        <div class="food-price">Rs. 90</div>
      </div>
      <button class="add-btn" onclick="addItem('Momos', 90)">Add</button>
    </div>

    <div class="order-box">
      <p id="order-items">No items added</p>
      <h3 id="total-price">Total: Rs. 0</h3>
    </div>

    <button id="submit-btn" onclick="submitOrder()">Submit Order</button>
    <button id="clear-btn" onclick="clearOrder()">Clear</button>

    <div id="success-msg">
      Your order is placed! Thank you :)
    </div>

  </div>

  <script>
    var total = 0;
    var orders = [];

    function addItem(name, price) {
      total = total + price;
      orders.push(name);
      document.getElementById('total-price').textContent = 'Total: Rs. ' + total;
      document.getElementById('order-items').textContent = orders.join(', ');
      document.getElementById('success-msg').style.display = 'none';
    }

    function submitOrder() {
      if (orders.length === 0) {
        alert('Please add something first!');
        return;
      }
      document.getElementById('success-msg').style.display = 'block';
    }

    function clearOrder() {
      total = 0;
      orders = [];
      document.getElementById('total-price').textContent = 'Total: Rs. 0';
      document.getElementById('order-items').textContent = 'No items added';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>

</body>
</html>
